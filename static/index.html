<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档问答系统</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="chat-container">
        <header>
            <h2>动态文档问答助手</h2>
            <div class="url-input-area" style="display: flex; gap: 10px; margin-top: 10px;">
                <input type="text" id="url-input" placeholder="请输入要分析的网页 URL (例如: https://...)"
                    style="flex: 1; padding: 5px;">
                <button id="load-url-btn" onclick="loadUrl()" style="padding: 5px 15px; cursor: pointer;">解析网页</button>
            </div>
        </header>

        <div class="chat-box" id="chat-box">
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="请输入你想问的问题..." autocomplete="off"
                onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" id="send-btn">发送</button>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>

</html>
